<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Music Downloader</title>
    <style>
        :root {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --text-tertiary: #adb5bd;
            --accent-color: #007bff;
            --accent-secondary: #0056b3;
            --border-color: #dee2e6;
            --shadow-color: rgba(0, 123, 255, 0.15);
            --success-color: #28a745;
            --error-color: #dc3545;
            --warning-color: #ffc107;
        }

        body.light-theme {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --text-tertiary: #adb5bd;
            --accent-color: #007bff;
            --accent-secondary: #0056b3;
            --border-color: #dee2e6;
            --shadow-color: rgba(0, 123, 255, 0.15);
            --success-color: #28a745;
            --error-color: #dc3545;
            --warning-color: #ffc107;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            transition: all 0.3s ease;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 30px 0;
            margin-bottom: 30px;
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            top: 30px;
            right: 20px;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 25px;
            padding: 8px 15px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            color: var(--text-secondary);
        }

        .theme-toggle:hover {
            background: var(--accent-color);
            color: var(--bg-primary);
            border-color: var(--accent-color);
        }

        .header h1 {
            font-size: 3em;
            color: var(--accent-color);
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.2em;
            text-align: center;
            margin-bottom: 0;
        }

        .search-box {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .search-type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .type-btn {
            padding: 10px 25px;
            font-size: 1em;
            font-weight: bold;
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .type-btn:hover {
            background: var(--accent-color);
            color: var(--bg-primary);
        }

        .type-btn.active {
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-secondary) 100%);
            color: var(--bg-primary);
            border-color: var(--accent-color);
        }

        .search-input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .query-hint {
            text-align: center;
            font-size: 0.9em;
            color: var(--text-tertiary);
            margin-top: 10px;
        }

        .query-hint.url-detected {
            color: var(--accent-color);
        }

        /* Advanced Download Options */
        .advanced-options {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            border: 1px solid var(--border-color);
            display: none;
        }

        .advanced-options.show {
            display: block;
        }

        .advanced-toggle {
            background: none;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            font-size: 0.9em;
            padding: 5px 10px;
            text-decoration: underline;
            margin-top: 10px;
        }

        .advanced-toggle:hover {
            color: var(--accent-secondary);
        }

        .option-group {
            margin-bottom: 15px;
        }

        .option-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-secondary);
            font-size: 0.9em;
            font-weight: bold;
        }

        .option-group select,
        .option-group input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            border-radius: 5px;
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 0.9em;
        }

        .option-group input[type="checkbox"] {
            margin-right: 8px;
        }

        .option-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }

        #searchInput {
            flex: 1;
            padding: 18px 25px;
            font-size: 1.2em;
            border: 2px solid var(--border-color);
            border-radius: 15px;
            background: var(--bg-primary);
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px var(--shadow-color);
            transform: translateY(-2px);
        }

        #searchBtn {
            padding: 18px 45px;
            font-size: 1.2em;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-secondary) 100%);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 140px;
        }

        #searchBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--shadow-color);
        }

        #searchBtn:active {
            transform: translateY(-1px);
        }

        #searchBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .status.searching {
            background: rgba(0, 136, 255, 0.2);
            border: 2px solid rgba(0, 136, 255, 0.5);
            display: block;
        }

        .status.complete {
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid rgba(0, 255, 136, 0.5);
            display: block;
        }

        .results-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .source-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            display: none;
        }

        .source-section.active {
            display: block;
        }

        .source-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .source-navigation {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .source-navigation.active {
            display: flex;
        }

        .source-nav-btn {
            padding: 12px 25px;
            font-size: 1em;
            font-weight: bold;
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .source-nav-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px var(--shadow-color);
        }

        .source-nav-btn.active {
            background: var(--accent-color);
            color: var(--bg-primary);
            border-color: var(--accent-color);
        }

        .source-nav-btn .count {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.85em;
            margin-left: 8px;
        }

        .source-nav-btn.active .count {
            background: rgba(0, 0, 0, 0.2);
        }

        .source-header h2 {
            font-size: 1.5em;
            color: var(--accent-color);
        }

        .source-header .count {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .songs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .song-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
            border-radius: 10px;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            cursor: pointer;
        }

        .song-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 5px 20px var(--shadow-color);
        }

        .song-card.selected {
            border-color: var(--accent-color);
            background: var(--bg-secondary);
        }

        .song-thumbnail {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.1);
        }

        .song-title {
            font-weight: bold;
            font-size: 1em;
            margin-bottom: 5px;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .song-artist {
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .song-metadata {
            font-size: 0.8em;
            color: #888;
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .song-metadata span {
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

        .song-actions {
            display: flex;
            gap: 10px;
        }

        .download-btn {
            flex: 1;
            padding: 8px 15px;
            background: var(--accent-color);
            color: var(--bg-primary);
            border: 1px solid var(--accent-color);
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px var(--shadow-color);
        }

        .download-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .download-btn.downloading {
            background: var(--warning-color);
            color: #000;
            border-color: var(--warning-color);
        }

        .download-btn.queued {
            background: var(--text-secondary);
            color: white;
            border-color: var(--text-secondary);
            opacity: 0.8;
        }

        .download-btn.complete {
            background: var(--success-color);
            color: white;
            border-color: var(--success-color);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 4em;
            margin-bottom: 20px;
            display: block;
        }

        .spinner {
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .songs-grid {
                grid-template-columns: 1fr;
            }

            .search-input-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="theme-toggle" onclick="toggleTheme()">
                <span id="themeIcon">🌙</span>
                <span id="themeText">Dark</span>
            </button>
            <h1>🎵 Universal Music Downloader</h1>
            <p>Search across YouTube Music, JioSaavn, SoundCloud & more</p>
        </div>

        <div class="search-box">
            <div class="search-type-selector">
                <button class="type-btn active" data-type="music" onclick="selectSearchType('music')">
                    🎵 Music
                </button>
                <button class="type-btn" data-type="video" onclick="selectSearchType('video')">
                    🎥 Videos
                </button>
                <button class="type-btn" data-type="all" onclick="selectSearchType('all')">
                    🌐 All Sources
                </button>
            </div>

            <div class="search-input-group">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Enter song name, artist, or paste URL..."
                    autocomplete="off"
                >
                <button id="searchBtn">🔍 Search</button>
            </div>

            <div id="queryHint" class="query-hint">
                💡 Tip: You can search by name or paste a URL from YouTube, JioSaavn, etc.
            </div>
        </div>

        <div id="status" class="status"></div>

        <!-- Source Navigation -->
        <div id="sourceNavigation" class="source-navigation"></div>

        <div id="results" class="results-container"></div>
    </div>

    <script>
        let currentSearchId = null;
        let selectedSongs = new Set();
        let searchType = 'music';  // Default search type
        let advancedOptionsVisible = false;

        // Download Queue Management
        const MAX_CONCURRENT_DOWNLOADS = 3;
        let activeDownloads = 0;
        let downloadQueue = [];

        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const statusDiv = document.getElementById('status');
        const resultsDiv = document.getElementById('results');
        const queryHint = document.getElementById('queryHint');

        // Load download queue from localStorage
        function loadDownloadQueue() {
            const saved = localStorage.getItem('downloadQueue');
            if (saved) {
                downloadQueue = JSON.parse(saved);
                // Resume pending downloads
                processQueue();
            }
        }

        // Save download queue to localStorage
        function saveDownloadQueue() {
            localStorage.setItem('downloadQueue', JSON.stringify(downloadQueue));
        }

        // Handle browser back/forward navigation
        window.addEventListener('popstate', (event) => {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');
            const type = urlParams.get('type');
            
            if (query) {
                searchInput.value = decodeURIComponent(query);
                if (type) {
                    searchType = type;
                }
                // Auto-trigger search
                performSearch();
            } else {
                // Clear search if no query in URL
                searchInput.value = '';
                resultsDiv.innerHTML = '';
                statusDiv.innerHTML = '';
            }
        });

        // Add download to queue
        function queueDownload(url, title, button, useAdvanced = false) {
            const queueItem = {
                url,
                title,
                useAdvanced,
                status: 'queued',
                timestamp: Date.now()
            };
            
            downloadQueue.push(queueItem);
            saveDownloadQueue();
            
            // Update button to show queued status
            button.disabled = true;
            button.className = 'download-btn queued';
            button.innerHTML = `⏸️ Queued (${downloadQueue.length})`;
            
            showNotification(`📋 ${title} added to queue`, 'info');
            
            // Try to process queue
            processQueue();
        }

        // Process download queue
        function processQueue() {
            while (activeDownloads < MAX_CONCURRENT_DOWNLOADS && downloadQueue.length > 0) {
                const item = downloadQueue.shift();
                saveDownloadQueue();
                
                activeDownloads++;
                startDownload(item.url, item.title, item.useAdvanced);
            }
        }

        // Theme Toggle
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            document.getElementById('themeIcon').textContent = isLight ? '☀️' : '🌙';
            document.getElementById('themeText').textContent = isLight ? 'Light' : 'Dark';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        // Load saved theme
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-theme');
                document.getElementById('themeIcon').textContent = '☀️';
                document.getElementById('themeText').textContent = 'Light';
            }

            // Load and resume download queue
            loadDownloadQueue();

            // Check for URL parameters and auto-search
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');
            const type = urlParams.get('type');
            
            if (query) {
                searchInput.value = decodeURIComponent(query);
                if (type) {
                    searchType = type;
                }
                // Auto-trigger search
                setTimeout(() => {
                    performSearch();
                }, 500);
            }
        });

        // Toggle Advanced Options
        function toggleAdvanced() {
            advancedOptionsVisible = !advancedOptionsVisible;
            const advOpts = document.getElementById('advancedOptions');
            const toggleText = document.getElementById('advancedToggleText');
            
            if (advancedOptionsVisible) {
                advOpts.classList.add('show');
                toggleText.textContent = 'Hide Advanced Options';
            } else {
                advOpts.classList.remove('show');
                toggleText.textContent = 'Show Advanced Options';
            }
        }

        // Toggle Download Type Options
        function toggleDownloadOptions() {
            const downloadType = document.getElementById('downloadType').value;
            const audioOptions = document.getElementById('audioOptions');
            
            if (downloadType === 'audio') {
                audioOptions.style.display = 'block';
            } else {
                audioOptions.style.display = 'none';
            }
        }

        // Detect URL in input
        searchInput.addEventListener('input', () => {
            const query = searchInput.value.trim();
            
            // Clear URL if input is empty
            if (!query) {
                const newUrl = new URL(window.location);
                newUrl.searchParams.delete('q');
                newUrl.searchParams.delete('type');
                window.history.replaceState({}, '', newUrl.pathname);
                resultsDiv.innerHTML = '';
                statusDiv.innerHTML = '';
                return;
            }
            
            const isUrl = /https?:\/\/|www\.|youtube\.com|youtu\.be|jiosaavn\.com|soundcloud\.com/i.test(query);
            
            if (isUrl) {
                queryHint.className = 'query-hint url-detected';
                queryHint.innerHTML = '🔗 URL detected! Click search to validate.';
            } else {
                queryHint.className = 'query-hint';
                queryHint.innerHTML = '💡 Tip: You can search by name or paste a URL from YouTube, JioSaavn, etc.';
            }
        });

        // Select search type
        function selectSearchType(type) {
            searchType = type;
            
            // Update button states
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Update search button text
            const btnText = {
                'music': '🔍 Search Music',
                'video': '🔍 Search Videos',
                'all': '🔍 Search All Sources'
            };
            searchBtn.innerHTML = btnText[type] || '🔍 Search';
            
            // Update URL if there's an active search
            const query = searchInput.value.trim();
            if (query) {
                const newUrl = new URL(window.location);
                newUrl.searchParams.set('q', encodeURIComponent(query));
                newUrl.searchParams.set('type', searchType);
                window.history.replaceState({}, '', newUrl);
            }
        }

        // Search on Enter key
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        // Search button click
        searchBtn.addEventListener('click', performSearch);

        async function performSearch() {
            const query = searchInput.value.trim();
            if (!query) return;

            // Update URL with search query
            const newUrl = new URL(window.location);
            newUrl.searchParams.set('q', encodeURIComponent(query));
            newUrl.searchParams.set('type', searchType);
            window.history.pushState({}, '', newUrl);

            // Clear previous results
            resultsDiv.innerHTML = '';
            selectedSongs.clear();

            // Detect if URL
            const isUrl = /https?:\/\/|www\.|youtube\.com|youtu\.be|jiosaavn\.com|soundcloud\.com/i.test(query);

            // Show searching status
            statusDiv.className = 'status searching';
            if (isUrl) {
                statusDiv.innerHTML = '<div class="spinner"></div> Validating URL...';
            } else {
                statusDiv.innerHTML = '<div class="spinner"></div> Searching all sources...';
            }

            // Disable search button
            searchBtn.disabled = true;

            try {
                // Start search
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        query: query,
                        type: searchType
                    })
                });

                const data = await response.json();
                currentSearchId = data.search_id;

                // Poll for results
                pollSearchResults();

            } catch (error) {
                console.error('Search error:', error);
                statusDiv.className = 'status';
                statusDiv.innerHTML = '❌ Search failed. Please try again.';
                searchBtn.disabled = false;
            }
        }

        async function pollSearchResults() {
            if (!currentSearchId) return;

            try {
                const response = await fetch(`/search_status/${currentSearchId}`);
                const data = await response.json();

                if (data.status === 'complete') {
                    displayResults(data);
                    statusDiv.className = 'status complete';
                    
                    // Calculate total with direct URL
                    const total = (data.ytmusic?.length || 0) + 
                                 (data.ytvideo?.length || 0) + 
                                 (data.jiosaavn?.length || 0) + 
                                 (data.direct_url?.length || 0);
                    
                    if (data.query_type === 'url') {
                        statusDiv.innerHTML = total > 0 ? 
                            '✅ Info extracted successfully!' : 
                            '⚠️ Could not extract info from URL';
                    } else {
                        statusDiv.innerHTML = `✅ Search complete! Found ${total} results`;
                    }
                    
                    searchBtn.disabled = false;
                } else {
                    // Keep polling
                    setTimeout(pollSearchResults, 500);
                }
            } catch (error) {
                console.error('Polling error:', error);
                searchBtn.disabled = false;
            }
        }

        function displayResults(data) {
            resultsDiv.innerHTML = '';

            // Check if it's a direct URL result
            if (data.query_type === 'url' && data.direct_url && data.direct_url.length > 0) {
                const section = createDirectUrlSection(data.direct_url[0]);
                resultsDiv.appendChild(section);
                return;
            }

            // Create source navigation
            const sources = [];
            if (data.ytmusic && data.ytmusic.length > 0) {
                sources.push({ id: 'ytmusic', name: 'YouTube Music', count: data.ytmusic.length, data: data.ytmusic });
            }
            if (data.ytvideo && data.ytvideo.length > 0) {
                sources.push({ id: 'ytvideo', name: 'YouTube Videos', count: data.ytvideo.length, data: data.ytvideo });
            }
            if (data.jiosaavn && data.jiosaavn.length > 0) {
                sources.push({ id: 'jiosaavn', name: 'JioSaavn', count: data.jiosaavn.length, data: data.jiosaavn });
            }
            if (data.soundcloud && data.soundcloud.length > 0) {
                sources.push({ id: 'soundcloud', name: 'SoundCloud', count: data.soundcloud.length, data: data.soundcloud });
            }

            if (sources.length === 0) {
                resultsDiv.innerHTML = '<div class="empty-state"><i>🔍</i><h3>No results found</h3><p>Try a different search query</p></div>';
                return;
            }

            // Create navigation buttons
            const navDiv = document.getElementById('sourceNavigation');
            navDiv.innerHTML = '';
            navDiv.className = 'source-navigation active';

            sources.forEach((source, index) => {
                const btn = document.createElement('button');
                btn.className = 'source-nav-btn' + (index === 0 ? ' active' : '');
                btn.innerHTML = `${source.name} <span class="count">${source.count}</span>`;
                btn.onclick = () => switchSource(source.id);
                navDiv.appendChild(btn);
            });

            // Create source sections
            sources.forEach((source, index) => {
                const section = createSourceSection(source.name, source.data, source.id);
                section.className = 'source-section' + (index === 0 ? ' active' : '');
                resultsDiv.appendChild(section);
            });
        }

        function switchSource(sourceId) {
            // Update navigation buttons
            document.querySelectorAll('.source-nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Update source sections
            document.querySelectorAll('.source-section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(sourceId).classList.add('active');

            // Scroll to results
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function createDirectUrlSection(info) {
            const section = document.createElement('div');
            section.className = 'source-section active';
            section.style.maxWidth = '800px';
            section.style.margin = '0 auto';

            section.innerHTML = `
                <div class="source-header">
                    <h2>🔗 Valid URL - Ready to Download</h2>
                </div>
                <div class="url-result-card" style="background: var(--bg-card); padding: 30px; border-radius: 15px; border: 2px solid var(--accent-color);">
                    <div style="margin-bottom: 20px;">
                        <h3 style="font-size: 1.8em; margin-bottom: 10px; color: var(--accent-color);">✅ URL Validated</h3>
                        <p style="color: var(--text-secondary); font-size: 1.1em; margin-bottom: 10px;">
                            <strong>Source:</strong> ${info.source}
                        </p>
                        <p style="color: var(--text-tertiary); font-size: 0.9em; word-break: break-all;">
                            🔗 ${info.url}
                        </p>
                    </div>

                    <!-- Advanced Download Options -->
                    <div style="margin-bottom: 20px;">
                        <button class="advanced-toggle" onclick="toggleAdvanced()" style="width: 100%; text-align: center; margin-bottom: 10px;">
                            ⚙️ <span id="advancedToggleText">Show Advanced Options</span>
                        </button>
                        <div id="advancedOptions" class="advanced-options">
                            <div class="option-row">
                                <div class="option-group">
                                    <label>Download Type</label>
                                    <select id="downloadType" onchange="toggleDownloadOptions()">
                                        <option value="audio" selected>🎵 Audio Only</option>
                                        <option value="video">🎬 Video (1080p 30fps MKV)</option>
                                    </select>
                                </div>
                            </div>
                            <div id="audioOptions">
                                <div class="option-row">
                                    <div class="option-group">
                                        <label>Audio Format</label>
                                        <select id="audioFormat">
                                            <option value="mp3" selected>MP3</option>
                                            <option value="m4a">M4A</option>
                                            <option value="opus">Opus</option>
                                            <option value="vorbis">Vorbis</option>
                                            <option value="wav">WAV</option>
                                        </select>
                                    </div>
                                    <div class="option-group">
                                        <label>Audio Quality</label>
                                        <select id="audioQuality">
                                            <option value="0" selected>Best (320kbps)</option>
                                            <option value="2">High (256kbps)</option>
                                            <option value="5">Medium (192kbps)</option>
                                            <option value="9">Low (128kbps)</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="option-row">
                                <div class="option-group">
                                    <label>
                                        <input type="checkbox" id="embedThumbnail" checked>
                                        Embed Thumbnail
                                    </label>
                                    <label>
                                        <input type="checkbox" id="addMetadata" checked>
                                        Add Metadata
                                    </label>
                                </div>
                            </div>
                            <div class="option-group">
                                <label>Custom Arguments (Advanced)</label>
                                <input type="text" id="customArgs" placeholder="e.g., --geo-bypass --prefer-free-formats">
                            </div>
                        </div>
                    </div>

                    <button class="download-btn" style="width: 100%; padding: 15px; font-size: 1.2em; font-weight: bold;" 
                            onclick="downloadSong('${info.url}', 'Downloaded_File', this, true)">
                        ⬇️ Download Now
                    </button>
                </div>
            `;

            return section;
        }

        function createSourceSection(title, songs, sourceId) {
            const section = document.createElement('div');
            section.className = 'source-section';
            section.id = sourceId;

            const header = document.createElement('div');
            header.className = 'source-header';
            header.innerHTML = `
                <h2>${title}</h2>
                <span class="count">${songs.length} results</span>
            `;

            const grid = document.createElement('div');
            grid.className = 'songs-grid';

            songs.forEach((song, index) => {
                const card = createSongCard(song, sourceId, index);
                grid.appendChild(card);
            });

            section.appendChild(header);
            section.appendChild(grid);

            return section;
        }

        function createSongCard(song, sourceId, index) {
            const card = document.createElement('div');
            card.className = 'song-card';
            card.dataset.songId = `${sourceId}-${index}`;

            // Use proxy for images to avoid CORS
            const thumbnailUrl = song.thumbnail ? 
                `/proxy_image?url=${encodeURIComponent(song.thumbnail)}` : 
                'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect fill="%23333"/><text x="50%" y="50%" text-anchor="middle" dy=".3em" fill="%23666">No Image</text></svg>';

            // Build metadata string based on source
            let metadataHTML = '';
            
            if (sourceId === 'soundcloud') {
                const parts = [];
                if (song.duration) parts.push(`⏱️ ${song.duration}`);
                if (song.plays) parts.push(`▶️ ${song.plays.toLocaleString()}`);
                if (song.likes) parts.push(`❤️ ${song.likes.toLocaleString()}`);
                if (song.genre) parts.push(`🎵 ${song.genre}`);
                
                if (parts.length > 0) {
                    metadataHTML = `<div class="song-metadata">${parts.map(p => `<span>${p}</span>`).join('')}</div>`;
                }
            } else if (sourceId === 'jiosaavn') {
                const parts = [];
                if (song.year) parts.push(`📅 ${song.year}`);
                if (song.language) parts.push(`🗣️ ${song.language}`);
                if (song.subtitle) parts.push(`📀 ${song.subtitle}`);
                
                if (parts.length > 0) {
                    metadataHTML = `<div class="song-metadata">${parts.map(p => `<span>${p}</span>`).join('')}</div>`;
                }
            }

            // Better artist display for JioSaavn
            let artistDisplay = song.artist || 'Unknown Artist';
            if (sourceId === 'jiosaavn' && song.subtitle && !song.artist) {
                // Extract artist from subtitle if available
                artistDisplay = song.subtitle.split(' - ')[0] || 'Unknown Artist';
            }

            card.innerHTML = `
                <img src="${thumbnailUrl}" alt="${song.title}" class="song-thumbnail" onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'100\\' height=\\'100\\'><rect fill=\\'%23333\\'/><text x=\\'50%\\' y=\\'50%\\' text-anchor=\\'middle\\' dy=\\'.3em\\' fill=\\'%23666\\'>No Image</text></svg>'">
                <div class="song-title">${song.title}</div>
                <div class="song-artist">${artistDisplay}</div>
                ${metadataHTML}
                <div class="song-actions">
                    <button class="download-btn" onclick="downloadSong('${song.url}', '${song.title.replace(/'/g, "\\'")}', this)">
                        ⬇ Download
                    </button>
                </div>
            `;

            return card;
        }

        async function downloadSong(url, title, button, useAdvanced = false) {
            // Check if download should be queued
            if (activeDownloads >= MAX_CONCURRENT_DOWNLOADS) {
                queueDownload(url, title, button, useAdvanced);
                return;
            }

            // Start download immediately
            activeDownloads++;
            startDownload(url, title, useAdvanced, button);
        }

        async function startDownload(url, title, useAdvanced = false, button = null) {
            // Find button if not provided
            if (!button) {
                // Try to find the button for this song (for resumed downloads)
                const buttons = document.querySelectorAll('.download-btn');
                for (let btn of buttons) {
                    if (btn.onclick && btn.onclick.toString().includes(url)) {
                        button = btn;
                        break;
                    }
                }
            }

            if (button) {
                button.disabled = true;
                button.className = 'download-btn downloading';
                button.innerHTML = '⏳ Starting...';
            }

            try {
                // Prepare request body
                const requestBody = { url, title };
                
                // Add advanced options if they should be used
                if (useAdvanced) {
                    const downloadType = document.getElementById('downloadType')?.value || 'audio';
                    requestBody.advancedOptions = {
                        audioFormat: document.getElementById('audioFormat')?.value || 'mp3',
                        audioQuality: document.getElementById('audioQuality')?.value || '0',
                        embedThumbnail: document.getElementById('embedThumbnail')?.checked !== false,
                        addMetadata: document.getElementById('addMetadata')?.checked !== false,
                        keepVideo: downloadType === 'video',
                        customArgs: document.getElementById('customArgs')?.value || ''
                    };
                }

                const response = await fetch('/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();
                const downloadId = data.download_id;

                // Poll download status
                if (button) {
                    pollDownloadStatus(downloadId, button, title);
                }

            } catch (error) {
                console.error('Download error:', error);
                if (button) {
                    button.className = 'download-btn';
                    button.innerHTML = '❌ Failed';
                    button.disabled = false;
                }
                
                // Download finished (failed), process next in queue
                activeDownloads--;
                processQueue();
            }
        }

        async function pollDownloadStatus(downloadId, button, title) {
            try {
                const response = await fetch(`/download_status/${downloadId}`);
                const data = await response.json();

                if (data.status === 'complete') {
                    button.className = 'download-btn complete';
                    button.innerHTML = '✅ Downloaded';
                    
                    // Trigger browser download
                    if (data.download_url) {
                        const link = document.createElement('a');
                        link.href = data.download_url;
                        link.download = data.file;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        
                        // Show notification
                        showNotification(`✅ ${data.title} downloaded successfully!`, 'success');
                    }
                    
                    // Download finished, process next in queue
                    activeDownloads--;
                    processQueue();
                    
                } else if (data.status === 'error') {
                    button.className = 'download-btn';
                    button.innerHTML = '❌ Failed';
                    button.disabled = false;
                    showNotification(`❌ Download failed: ${data.error || 'Unknown error'}`, 'error');
                    
                    // Download finished (failed), process next in queue
                    activeDownloads--;
                    processQueue();
                    
                } else if (data.status === 'downloading') {
                    // Show progress
                    const progress = data.progress || 0;
                    const speed = data.speed || 'N/A';
                    const eta = data.eta || 'N/A';
                    
                    button.className = 'download-btn downloading';
                    button.innerHTML = `
                        <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
                            <div>⏳ ${Math.round(progress)}%</div>
                            <div style="font-size: 0.75em; opacity: 0.8;">${speed} • ETA ${eta}</div>
                        </div>
                    `;
                    
                    // Keep polling
                    setTimeout(() => pollDownloadStatus(downloadId, button, title), 500);
                } else {
                    // Keep polling
                    setTimeout(() => pollDownloadStatus(downloadId, button, title), 1000);
                }
            } catch (error) {
                console.error('Status check error:', error);
                button.className = 'download-btn';
                button.innerHTML = '⬇ Download';
                button.disabled = false;
                
                // Download finished (error), process next in queue
                activeDownloads--;
                processQueue();
            }
        }

        // Show notification
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            
            // Use semantic colors
            let bgColor, textColor, borderColor;
            
            if (type === 'success') {
                bgColor = 'var(--success-color)';
                textColor = 'white';
                borderColor = 'var(--success-color)';
            } else if (type === 'error') {
                bgColor = 'var(--error-color)';
                textColor = 'white';
                borderColor = 'var(--error-color)';
            } else {
                bgColor = 'var(--accent-color)';
                textColor = 'white';
                borderColor = 'var(--accent-color)';
            }
            
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 20px;
                background: ${bgColor};
                color: ${textColor};
                border: 1px solid ${borderColor};
                border-radius: 10px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
                z-index: 10000;
                animation: slideIn 0.3s ease-out;
                max-width: 400px;
                font-size: 14px;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => notification.remove(), 300);
            }, 5000);
        }
    </script>
</body>
</html>
