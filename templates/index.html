<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Music Downloader</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-card: #ffffff;
            --text-primary: #2d3436;
            --text-secondary: #636e72;
            --text-tertiary: #95a5a6;
            --accent-color: #00b894;
            --accent-secondary: #00a085;
            --border-color: #ddd;
            --shadow-color: rgba(0, 184, 148, 0.15);
            --success-color: #00b894;
            --error-color: #e74c3c;
            --warning-color: #f39c12;
            --download-color: #6c5ce7;
        }

        body.light-theme {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-card: #ffffff;
            --text-primary: #2d3436;
            --text-secondary: #636e72;
            --text-tertiary: #95a5a6;
            --accent-color: #00b894;
            --accent-secondary: #00a085;
            --border-color: #ddd;
            --shadow-color: rgba(0, 184, 148, 0.15);
            --success-color: #00b894;
            --error-color: #e74c3c;
            --warning-color: #f39c12;
            --download-color: #6c5ce7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            transition: all 0.3s ease;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }

        /* Download Manager */
        .download-manager {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 350px;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            max-height: 70vh;
            overflow-y: auto;
            display: none;
        }

        .download-manager.show {
            display: block;
        }

        .download-manager-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--accent-color);
            color: white;
            border-radius: 13px 13px 0 0;
        }

        .download-manager-header h3 {
            margin: 0;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .download-manager-controls {
            display: flex;
            gap: 8px;
        }

        .download-manager-controls button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            border-radius: 5px;
            padding: 5px 8px;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.2s;
        }

        .download-manager-controls button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .download-list {
            max-height: 50vh;
            overflow-y: auto;
        }

        .download-item {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
            transition: all 0.3s;
        }

        .download-item:last-child {
            border-bottom: none;
        }

        .download-item.downloading {
            background: rgba(0, 184, 148, 0.1);
        }

        .download-item.queued {
            background: rgba(108, 92, 231, 0.05);
            border-left: 3px solid var(--download-color);
        }

        .download-item.complete {
            background: rgba(0, 184, 148, 0.05);
        }

        .download-item.error {
            background: rgba(231, 76, 60, 0.05);
        }

        .download-item.cancelled {
            background: rgba(149, 165, 166, 0.05);
        }

        .download-title {
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: var(--text-primary);
        }

        .download-progress {
            margin-bottom: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border-color);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-color);
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .progress-fill.complete {
            background: var(--success-color);
        }

        .progress-fill.error {
            background: var(--error-color);
        }

        .progress-fill.queued {
            background: var(--download-color);
            width: 100% !important;
            opacity: 0.3;
        }

        .download-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8em;
            color: var(--text-secondary);
        }

        .download-actions {
            display: flex;
            gap: 5px;
        }

        .download-actions button {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 3px;
            padding: 2px 6px;
            cursor: pointer;
            font-size: 0.7em;
            transition: all 0.2s;
        }

        .download-actions button:hover {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .download-actions button.cancel {
            border-color: var(--error-color);
            color: var(--error-color);
        }

        .download-actions button.cancel:hover {
            background: var(--error-color);
            color: white;
        }

        .download-manager-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--shadow-color);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-size: 1.2em;
        }

        .download-manager-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px var(--shadow-color);
        }

        .download-manager-toggle .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--error-color);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.7em;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .header {
            text-align: center;
            padding: 30px 0;
            margin-bottom: 30px;
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            top: 30px;
            right: 20px;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 25px;
            padding: 8px 15px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            color: var(--text-secondary);
        }

        .theme-toggle:hover {
            background: var(--accent-color);
            color: var(--bg-primary);
            border-color: var(--accent-color);
        }

        .header h1 {
            font-size: 3em;
            color: var(--accent-color);
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
        }

        .header h1 a:hover {
            opacity: 0.8;
            transform: scale(1.02);
            transition: all 0.3s ease;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.2em;
            text-align: center;
            margin-bottom: 0;
        }

        .search-box {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .search-type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .type-btn {
            padding: 10px 25px;
            font-size: 1em;
            font-weight: bold;
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .type-btn:hover {
            background: var(--accent-color);
            color: var(--bg-primary);
        }

        .type-btn.active {
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-secondary) 100%);
            color: var(--bg-primary);
            border-color: var(--accent-color);
        }

        .search-input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .query-hint {
            text-align: center;
            font-size: 0.9em;
            color: var(--text-tertiary);
            margin-top: 10px;
        }

        .query-hint.url-detected {
            color: var(--accent-color);
        }

        /* Advanced Download Options */
        .advanced-options {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            border: 1px solid var(--border-color);
            display: none;
        }

        .advanced-options.show {
            display: block;
        }

        .advanced-toggle {
            background: none;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            font-size: 0.9em;
            padding: 5px 10px;
            text-decoration: underline;
            margin-top: 10px;
        }

        .advanced-toggle:hover {
            color: var(--accent-secondary);
        }

        .option-group {
            margin-bottom: 15px;
        }

        .option-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-secondary);
            font-size: 0.9em;
            font-weight: bold;
        }

        .option-group select,
        .option-group input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            border-radius: 5px;
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 0.9em;
        }

        .option-group input[type="checkbox"] {
            margin-right: 8px;
        }

        .option-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }

        #searchInput {
            flex: 1;
            padding: 18px 25px;
            font-size: 1.2em;
            border: 2px solid var(--border-color);
            border-radius: 15px;
            background: var(--bg-primary);
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px var(--shadow-color);
            transform: translateY(-2px);
        }

        #searchBtn {
            padding: 18px 45px;
            font-size: 1.2em;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-secondary) 100%);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 140px;
        }

        #searchBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--shadow-color);
        }

        #searchBtn:active {
            transform: translateY(-1px);
        }

        #searchBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .status.searching {
            background: rgba(0, 136, 255, 0.2);
            border: 2px solid rgba(0, 136, 255, 0.5);
            display: block;
        }

        .status.complete {
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid rgba(0, 255, 136, 0.5);
            display: block;
        }

        .results-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .source-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            display: none;
        }

        .source-section.active {
            display: block;
        }

        .source-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .source-navigation {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .source-navigation.active {
            display: flex;
        }

        .source-nav-btn {
            padding: 12px 25px;
            font-size: 1em;
            font-weight: bold;
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .source-nav-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px var(--shadow-color);
        }

        .source-nav-btn.active {
            background: var(--accent-color);
            color: var(--bg-primary);
            border-color: var(--accent-color);
        }

        .source-nav-btn .count {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.85em;
            margin-left: 8px;
        }

        .source-nav-btn.active .count {
            background: rgba(0, 0, 0, 0.2);
        }

        .source-header h2 {
            font-size: 1.5em;
            color: var(--accent-color);
        }

        .source-header .count {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .songs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .song-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
            border-radius: 10px;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            cursor: pointer;
        }

        .song-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 5px 20px var(--shadow-color);
        }

        .song-card.selected {
            border-color: var(--accent-color);
            background: var(--bg-secondary);
        }

        .song-thumbnail {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.1);
        }

        .song-title {
            font-weight: bold;
            font-size: 1em;
            margin-bottom: 5px;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .song-artist {
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .song-metadata {
            font-size: 0.8em;
            color: #888;
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .song-metadata span {
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

        .song-actions {
            display: flex;
            gap: 10px;
        }

        .download-btn {
            flex: 1;
            padding: 8px 15px;
            background: var(--accent-color);
            color: var(--bg-primary);
            border: 1px solid var(--accent-color);
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px var(--shadow-color);
        }

        .download-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .download-btn.downloading {
            background: var(--warning-color);
            color: #000;
            border-color: var(--warning-color);
        }

        .download-btn.queued {
            background: var(--text-secondary);
            color: white;
            border-color: var(--text-secondary);
            opacity: 0.8;
        }

        .download-btn.complete {
            background: var(--success-color);
            color: white;
            border-color: var(--success-color);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 4em;
            margin-bottom: 20px;
            display: block;
        }

        .spinner {
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .songs-grid {
                grid-template-columns: 1fr;
            }

            .search-input-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
  
            <h1>
                <a href="{{ frontend_url }}" style="text-decoration: none; color: inherit; display: inline-flex; align-items: center; cursor: pointer;">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline-block; margin-right: 10px;">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M12 1v6m0 6v6m11-7h-6m-6 0H1"></path>
                    </svg>
                    Universal Music Downloader
                </a>
            </h1>
            <p>Download high-quality music from YouTube, SoundCloud, JioSaavn & more</p>
        </div>

        <div class="search-box">
            <div class="search-type-selector">
                <button class="type-btn active" data-type="music" onclick="selectSearchType('music')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18V5l12-2v13"></path>
                        <circle cx="6" cy="18" r="3"></circle>
                        <circle cx="18" cy="16" r="3"></circle>
                    </svg>
                    Music
                </button>
                <button class="type-btn" data-type="video" onclick="selectSearchType('video')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="23 7 16 12 23 17 23 7"></polygon>
                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                    </svg>
                    Videos
                </button>
                <button class="type-btn" data-type="all" onclick="selectSearchType('all')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                    </svg>
                    All Sources
                </button>
            </div>

            <div class="search-input-group">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Enter song name, artist, or paste URL..."
                    autocomplete="off"
                >
                <button id="searchBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    Search
                </button>
            </div>

            <div id="queryHint" class="query-hint">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline-block; margin-right: 5px;">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                Search by name or paste a music URL (YouTube, SoundCloud, JioSaavn, Spotify, etc.)
            </div>
        </div>

        <div id="status" class="status"></div>

        <!-- Source Navigation -->
        <div id="sourceNavigation" class="source-navigation"></div>

        <div id="results" class="results-container"></div>

        <!-- Download Manager -->
        <div id="downloadManager" class="download-manager">
            <div class="download-manager-header">
                <h3>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7,10 12,15 17,10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Downloads
                </h3>
                <div class="download-manager-controls">
                    <button onclick="clearFinishedDownloads()" title="Clear Finished">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3,6 5,6 21,6"></polyline>
                            <path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6M8,6V4a2,2,0,0,1,2-2h4a2,2,0,0,1,2,2v2"></path>
                        </svg>
                    </button>
                    <button onclick="toggleDownloadManager()" title="Close">×</button>
                </div>
            </div>
            <div id="downloadList" class="download-list">
                <div style="padding: 20px; text-align: center; color: var(--text-secondary);">
                    No downloads yet
                </div>
            </div>
        </div>

        <!-- Download Manager Toggle Button -->
        <button id="downloadToggle" class="download-manager-toggle" onclick="toggleDownloadManager()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7,10 12,15 17,10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            <span id="downloadBadge" class="badge" style="display: none;">0</span>
        </button>
    </div>

    <script>
        let currentSearchId = null;
        let selectedSongs = new Set();
        let searchType = 'music';  // Default search type
        let advancedOptionsVisible = false;
        let downloadManagerVisible = false;
        let allDownloads = {};

        // Download Queue Management
        const MAX_CONCURRENT_DOWNLOADS = 3;
        let activeDownloads = 0;
        let downloadQueue = [];

        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const statusDiv = document.getElementById('status');
        const resultsDiv = document.getElementById('results');
        const queryHint = document.getElementById('queryHint');

        // Update download manager UI
        function updateDownloadManager() {
            const downloadList = document.getElementById('downloadList');
            const downloads = Object.entries(allDownloads);
            
            // Add queued items to the display
            const queuedItems = downloadQueue.map((item, index) => [
                `queue_${index}`, 
                {
                    ...item,
                    status: 'queued',
                    progress: 0,
                    timestamp: item.timestamp || Date.now()
                }
            ]);
            
            const allItems = [...downloads, ...queuedItems];
            
            if (allItems.length === 0) {
                downloadList.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-secondary);">No downloads yet</div>';
                return;
            }
            
            // Sort by timestamp (newest first)
            allItems.sort((a, b) => {
                const timeA = new Date(a[1].timestamp || 0);
                const timeB = new Date(b[1].timestamp || 0);
                return timeB - timeA;
            });
            
            downloadList.innerHTML = allItems.map(([downloadId, download]) => {
                const statusClass = download.status;
                const progressWidth = download.progress || 0;
                
                let statusIcon = '';
                switch (download.status) {
                    case 'queued':
                        statusIcon = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>';
                        break;
                    case 'downloading':
                        statusIcon = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7,10 12,15 17,10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>';
                        break;
                    case 'complete':
                        statusIcon = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>';
                        break;
                    case 'error':
                        statusIcon = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>';
                        break;
                    case 'cancelled':
                        statusIcon = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>';
                        break;
                }
                
                let actions = '';
                if (download.status === 'queued') {
                    // Only queued downloads can be cancelled from queue
                    const queueIndex = downloadId.startsWith('queue_') ? downloadId.split('_')[1] : -1;
                    actions = `<button class="cancel" onclick="cancelQueuedDownload(${queueIndex})">Remove</button>`;
                } else if (download.status === 'complete' && download.download_url) {
                    actions = `<button onclick="window.open('${download.download_url}', '_blank')">Download</button>`;
                }
                
                let timeInfo;
                if (download.status === 'downloading') {
                    timeInfo = `${download.speed || '0 KB/s'} • ETA: ${download.eta || 'Unknown'}`;
                } else if (download.status === 'queued') {
                    const position = downloadId.startsWith('queue_') ? parseInt(downloadId.split('_')[1]) + 1 : 'Unknown';
                    timeInfo = `Position ${position} in queue`;
                } else {
                    timeInfo = new Date(download.timestamp).toLocaleString();
                }
                
                return `
                    <div class="download-item ${statusClass}">
                        <div class="download-title">${download.title}</div>
                        <div class="download-progress">
                            <div class="progress-bar">
                                <div class="progress-fill ${statusClass}" style="width: ${progressWidth}%"></div>
                            </div>
                        </div>
                        <div class="download-info">
                            <span>${statusIcon} ${progressWidth}% • ${timeInfo}</span>
                            <div class="download-actions">${actions}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Update download badge
        function updateDownloadBadge() {
            const badge = document.getElementById('downloadBadge');
            const activeCount = Object.values(allDownloads).filter(d => d.status === 'downloading').length;
            const queuedCount = downloadQueue.length;
            const totalActive = activeCount + queuedCount;
            
            if (totalActive > 0) {
                badge.textContent = totalActive;
                badge.style.display = 'flex';
            } else {
                badge.style.display = 'none';
            }
        }

        // Toggle download manager visibility
        function toggleDownloadManager() {
            const manager = document.getElementById('downloadManager');
            downloadManagerVisible = !downloadManagerVisible;
            
            if (downloadManagerVisible) {
                manager.classList.add('show');
            } else {
                manager.classList.remove('show');
            }
        }

        // Cancel download
        async function cancelDownload(downloadId) {
            try {
                const response = await fetch(`/cancel_download/${downloadId}`, {
                    method: 'POST'
                });
                const result = await response.json();
                
                if (response.ok) {
                    showNotification(result.message, 'info');
                    loadAllDownloads(); // Refresh
                } else {
                    showNotification(result.error, 'error');
                }
            } catch (error) {
                showNotification('Failed to cancel download', 'error');
            }
        }

        // Cancel queued download (remove from queue)
        function cancelQueuedDownload(queueIndex) {
            if (queueIndex >= 0 && queueIndex < downloadQueue.length) {
                const item = downloadQueue[queueIndex];
                
                // Find and reset the corresponding button
                const button = document.getElementById(item.buttonId);
                if (button) {
                    button.className = 'download-btn';
                    button.innerHTML = '⬇ Download';
                    button.disabled = false;
                }
                
                // Remove from queue
                downloadQueue.splice(queueIndex, 1);
                
                showNotification(`${item.title} removed from queue`, 'info');
                updateDownloadManager();
                updateDownloadBadge();
            }
        }

        // Clear finished downloads
        async function clearFinishedDownloads() {
            try {
                const response = await fetch('/clear_downloads', {
                    method: 'POST'
                });
                const result = await response.json();
                
                showNotification(result.message, 'success');
                loadAllDownloads(); // Refresh
            } catch (error) {
                showNotification('Failed to clear downloads', 'error');
            }
        }

        // Handle browser back/forward navigation
        window.addEventListener('popstate', (event) => {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');
            const type = urlParams.get('type');
            
            if (query) {
                searchInput.value = decodeURIComponent(query);
                if (type) {
                    searchType = type;
                }
                // Auto-trigger search
                performSearch();
            } else {
                // Clear search if no query in URL
                searchInput.value = '';
                resultsDiv.innerHTML = '';
                statusDiv.innerHTML = '';
            }
        });

        // Add download to queue
        function queueDownload(url, title, button, useAdvanced = false) {
            console.log(`➕ Adding to queue: "${title}"`);
            
            const queueItem = {
                url,
                title,
                useAdvanced,
                status: 'queued',
                timestamp: Date.now(),
                buttonId: button.id || `btn_${Date.now()}` // Track button for updates
            };
            
            // Assign ID to button if it doesn't have one
            if (!button.id) {
                button.id = queueItem.buttonId;
            }
            
            downloadQueue.push(queueItem);
            
            console.log(`✅ Added to queue. Queue length: ${downloadQueue.length}, Position: ${downloadQueue.length}`);
            
            // Update button to show queued status
            button.disabled = true;
            button.className = 'download-btn queued';
            button.innerHTML = `
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                </svg>
                Queued (${downloadQueue.length})
            `;
            
            showNotification(`${title} added to download queue (Position ${downloadQueue.length})`, 'info');
            
            // Update download manager
            updateDownloadManager();
            updateDownloadBadge();
            
            // Try to process queue
            processQueue();
        }

        // Process download queue
        function processQueue() {
            console.log(`🔄 Processing queue: ${downloadQueue.length} items, ${activeDownloads}/${MAX_CONCURRENT_DOWNLOADS} active`);
            
            while (activeDownloads < MAX_CONCURRENT_DOWNLOADS && downloadQueue.length > 0) {
                const item = downloadQueue.shift();
                
                console.log(`▶️ Starting queued download: "${item.title}"`);
                
                // Find and update the button status
                const button = document.getElementById(item.buttonId);
                if (button) {
                    button.className = 'download-btn downloading';
                    button.innerHTML = '<div class="spinner"></div> Starting...';
                }
                
                // Start the download
                activeDownloads++;
                startDownload(item.url, item.title, item.useAdvanced, button);
                
                // Update download manager to reflect queue changes
                updateDownloadManager();
                updateDownloadBadge();
            }
            
            console.log(`✅ Queue processed. Remaining: ${downloadQueue.length} items, ${activeDownloads} active`);
        }

        // Theme Toggle
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            const themeIcon = document.getElementById('themeIcon');
            
            if (isLight) {
                themeIcon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
                document.getElementById('themeText').textContent = 'Light';
            } else {
                themeIcon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
                document.getElementById('themeText').textContent = 'Dark';
            }
            
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        // Load saved theme - NO download persistence
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-theme');
                const themeIcon = document.getElementById('themeIcon');
                themeIcon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
                document.getElementById('themeText').textContent = 'Light';
            }

            // NO download persistence - always start fresh
            console.log('🆕 Fresh start - No download history');

            // Check for URL parameters and auto-search
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');
            const type = urlParams.get('type');
            
            if (query) {
                searchInput.value = decodeURIComponent(query);
                if (type) {
                    searchType = type;
                }
                // Auto-trigger search
                setTimeout(() => {
                    performSearch();
                }, 500);
            }
        });

        // Toggle Advanced Options
        function toggleAdvanced() {
            advancedOptionsVisible = !advancedOptionsVisible;
            const advOpts = document.getElementById('advancedOptions');
            const toggleText = document.getElementById('advancedToggleText');
            
            if (advancedOptionsVisible) {
                advOpts.classList.add('show');
                toggleText.textContent = 'Hide Advanced Options';
            } else {
                advOpts.classList.remove('show');
                toggleText.textContent = 'Show Advanced Options';
            }
        }

        // Toggle Download Type Options
        function toggleDownloadOptions() {
            const downloadType = document.getElementById('downloadType').value;
            const audioOptions = document.getElementById('audioOptions');
            
            if (downloadType === 'audio') {
                audioOptions.style.display = 'block';
            } else {
                audioOptions.style.display = 'none';
            }
        }

        // Detect URL in input
        searchInput.addEventListener('input', () => {
            const query = searchInput.value.trim();
            
            // Clear URL if input is empty
            if (!query) {
                const newUrl = new URL(window.location);
                newUrl.searchParams.delete('q');
                newUrl.searchParams.delete('type');
                window.history.replaceState({}, '', newUrl.pathname);
                resultsDiv.innerHTML = '';
                statusDiv.innerHTML = '';
                return;
            }
            
            // Check if it's a MUSIC-related URL (not just any URL)
            const isMusicUrl = /youtube\.com\/watch|youtu\.be\/|music\.youtube\.com|jiosaavn\.com\/|saavn\.com\/|soundcloud\.com\/|spotify\.com\/|gaana\.com\/|wynk\.in\//i.test(query);
            
            // Check if it's ANY URL (including non-music URLs)
            const isAnyUrl = /https?:\/\/|www\./i.test(query);
            
            if (isMusicUrl) {
                queryHint.className = 'query-hint url-detected';
                queryHint.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline; margin-right: 5px;"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>Music URL detected! Click search to download.';
            } else if (isAnyUrl) {
                // It's a URL but not a music URL - show error
                queryHint.className = 'query-hint';
                queryHint.style.color = 'var(--error-color)';
                queryHint.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline; margin-right: 5px;"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>Invalid URL! Only music URLs supported (YouTube, SoundCloud, JioSaavn, Spotify, etc.)';
            } else {
                queryHint.className = 'query-hint';
                queryHint.style.color = '';
                queryHint.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline; margin-right: 5px;"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>Search by name or paste a music URL (YouTube, SoundCloud, JioSaavn, Spotify, etc.)';
            }
        });

        // Select search type
        function selectSearchType(type) {
            searchType = type;
            
            // Update button states
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Update search button text
            const btnText = {
                'music': '🔍 Search Music',
                'video': '🔍 Search Videos',
                'all': '🔍 Search All Sources'
            };
            searchBtn.innerHTML = btnText[type] || '🔍 Search';
            
            // Update URL if there's an active search
            const query = searchInput.value.trim();
            if (query) {
                const newUrl = new URL(window.location);
                newUrl.searchParams.set('q', encodeURIComponent(query));
                newUrl.searchParams.set('type', searchType);
                window.history.replaceState({}, '', newUrl);
            }
        }

        // Search on Enter key
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        // Search button click
        searchBtn.addEventListener('click', performSearch);

        async function performSearch() {
            const query = searchInput.value.trim();
            if (!query) return;

            // Check if it's a MUSIC-related URL
            const isMusicUrl = /youtube\.com\/watch|youtu\.be\/|music\.youtube\.com|jiosaavn\.com\/|saavn\.com\/|soundcloud\.com\/|spotify\.com\/|gaana\.com\/|wynk\.in\//i.test(query);
            
            // Check if it's ANY URL (including non-music URLs)
            const isAnyUrl = /https?:\/\/|www\./i.test(query);
            
            // If it's a URL but NOT a music URL, show error and stop
            if (isAnyUrl && !isMusicUrl) {
                statusDiv.className = 'status';
                statusDiv.style.display = 'block';
                statusDiv.style.background = 'rgba(231, 76, 60, 0.2)';
                statusDiv.style.border = '2px solid rgba(231, 76, 60, 0.5)';
                statusDiv.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline; margin-right: 8px; vertical-align: middle;"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg><strong>Invalid URL!</strong> Only music platform URLs are supported (YouTube, SoundCloud, JioSaavn, Spotify, etc.)';
                return;
            }

            // Update URL with search query
            const newUrl = new URL(window.location);
            newUrl.searchParams.set('q', encodeURIComponent(query));
            newUrl.searchParams.set('type', searchType);
            window.history.pushState({}, '', newUrl);

            // Clear previous results
            resultsDiv.innerHTML = '';
            selectedSongs.clear();

            // Show searching status
            statusDiv.className = 'status searching';
            if (isMusicUrl) {
                statusDiv.innerHTML = '<div class="spinner"></div> Validating URL...';
            } else {
                statusDiv.innerHTML = '<div class="spinner"></div> Searching all sources...';
            }

            // Disable search button
            searchBtn.disabled = true;

            try {
                // Start search
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        query: query,
                        type: searchType
                    })
                });

                const data = await response.json();
                currentSearchId = data.search_id;

                // Poll for results
                pollSearchResults();

            } catch (error) {
                console.error('Search error:', error);
                statusDiv.className = 'status';
                statusDiv.innerHTML = '❌ Search failed. Please try again.';
                searchBtn.disabled = false;
            }
        }

        async function pollSearchResults() {
            if (!currentSearchId) return;

            try {
                const response = await fetch(`/search_status/${currentSearchId}`);
                const data = await response.json();

                if (data.status === 'complete') {
                    displayResults(data);
                    statusDiv.className = 'status complete';
                    
                    // Calculate total with direct URL
                    const total = (data.ytmusic?.length || 0) + 
                                 (data.ytvideo?.length || 0) + 
                                 (data.jiosaavn?.length || 0) + 
                                 (data.direct_url?.length || 0);
                    
                    if (data.query_type === 'url') {
                        statusDiv.innerHTML = total > 0 ? 
                            '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline; margin-right: 5px;"><polyline points="20 6 9 17 4 12"></polyline></svg>Info extracted successfully!' : 
                            '⚠️ Could not extract info from URL';
                    } else {
                        statusDiv.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline; margin-right: 5px;"><polyline points="20 6 9 17 4 12"></polyline></svg>Search complete! Found ${total} results`;
                    }
                    
                    searchBtn.disabled = false;
                } else {
                    // Keep polling
                    setTimeout(pollSearchResults, 500);
                }
            } catch (error) {
                console.error('Polling error:', error);
                searchBtn.disabled = false;
            }
        }

        function displayResults(data) {
            resultsDiv.innerHTML = '';

            // Check if it's a direct URL result
            if (data.query_type === 'url' && data.direct_url && data.direct_url.length > 0) {
                const section = createDirectUrlSection(data.direct_url[0]);
                resultsDiv.appendChild(section);
                return;
            }

            // Create source navigation
            const sources = [];
            if (data.ytmusic && data.ytmusic.length > 0) {
                sources.push({ id: 'ytmusic', name: 'YouTube Music', count: data.ytmusic.length, data: data.ytmusic });
            }
            if (data.ytvideo && data.ytvideo.length > 0) {
                sources.push({ id: 'ytvideo', name: 'YouTube Videos', count: data.ytvideo.length, data: data.ytvideo });
            }
            if (data.jiosaavn && data.jiosaavn.length > 0) {
                sources.push({ id: 'jiosaavn', name: 'JioSaavn', count: data.jiosaavn.length, data: data.jiosaavn });
            }
            if (data.soundcloud && data.soundcloud.length > 0) {
                sources.push({ id: 'soundcloud', name: 'SoundCloud', count: data.soundcloud.length, data: data.soundcloud });
            }

            if (sources.length === 0) {
                resultsDiv.innerHTML = '<div class="empty-state"><i>🔍</i><h3>No results found</h3><p>Try a different search query</p></div>';
                return;
            }

            // Create navigation buttons
            const navDiv = document.getElementById('sourceNavigation');
            navDiv.innerHTML = '';
            navDiv.className = 'source-navigation active';

            sources.forEach((source, index) => {
                const btn = document.createElement('button');
                btn.className = 'source-nav-btn' + (index === 0 ? ' active' : '');
                btn.innerHTML = `${source.name} <span class="count">${source.count}</span>`;
                btn.onclick = () => switchSource(source.id);
                navDiv.appendChild(btn);
            });

            // Create source sections
            sources.forEach((source, index) => {
                const section = createSourceSection(source.name, source.data, source.id);
                section.className = 'source-section' + (index === 0 ? ' active' : '');
                resultsDiv.appendChild(section);
            });
        }

        function switchSource(sourceId) {
            // Update navigation buttons
            document.querySelectorAll('.source-nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Update source sections
            document.querySelectorAll('.source-section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(sourceId).classList.add('active');

            // Scroll to results
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

                </div>

                        </p>
                    </div>

                    <!-- Advanced Download Options -->
                    <div style="margin-bottom: 20px;">
                        <button class="advanced-toggle" onclick="toggleAdvanced()" style="width: 100%; text-align: center; margin-bottom: 10px;">
                            ⚙️ <span id="advancedToggleText">Show Advanced Options</span>
                        </button>
                        <div id="advancedOptions" class="advanced-options">
                            <div class="option-row">
                                <div class="option-group">
                                    <label>Download Type</label>
                                    <select id="downloadType" onchange="toggleDownloadOptions()">

                                        <option value="video">🎬 Video (1080p 30fps MKV)</option>

                                <div class="option-row">
                                    <div class="option-group">
                                        <label>Audio Format</label>
                                        <select id="audioFormat">
                                            <option value="mp3" selected>MP3</option>
                                            <option value="m4a">M4A</option>
                                            <option value="opus">Opus</option>
                                            <option value="vorbis">Vorbis</option>
                                            <option value="wav">WAV</option>

                                        <select id="audioQuality">
                                            <option value="0" selected>Best (320kbps)</option>

                    <button class="download-btn" style="width: 100%; padding: 15px; font-size: 1.2em; font-weight: bold;"

        function createSourceSection(title, songs, sourceId) {
            const section = document.createElement('div');
            section.className = 'source-section';
            section.id = sourceId;

            const header = document.createElement('div');
            header.className = 'source-header';
            header.innerHTML = `
                <h2>${title}</h2>
                <span class="count">${songs.length} results</span>
            `;

            const grid = document.createElement('div');
            grid.className = 'songs-grid';

            songs.forEach((song, index) => {
                const card = createSongCard(song, sourceId, index);
                grid.appendChild(card);
            });

            section.appendChild(header);
            section.appendChild(grid);

            return section;
        }

        function createSongCard(song, sourceId, index) {
            const card = document.createElement('div');
            card.className = 'song-card';
            card.dataset.songId = `${sourceId}-${index}`;

            // Use proxy for images to avoid CORS
            const thumbnailUrl = song.thumbnail ? 
                `/proxy_image?url=${encodeURIComponent(song.thumbnail)}` : 
                'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect fill="%23333"/><text x="50%" y="50%" text-anchor="middle" dy=".3em" fill="%23666">No Image</text></svg>';

            // Build metadata string based on source
            let metadataHTML = '';
            
            if (sourceId === 'soundcloud') {
                const parts = [];
                if (song.duration) parts.push(`⏱️ ${song.duration}`);
                if (song.plays) parts.push(`▶️ ${song.plays.toLocaleString()}`);
                if (song.likes) parts.push(`❤️ ${song.likes.toLocaleString()}`);
                if (song.genre) parts.push(`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline; margin-right: 3px;"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>${song.genre}`);
                
                if (parts.length > 0) {
                    metadataHTML = `<div class="song-metadata">${parts.map(p => `<span>${p}</span>`).join('')}</div>`;
                }
            } else if (sourceId === 'jiosaavn') {
                const parts = [];
                if (song.year) parts.push(`📅 ${song.year}`);
                if (song.language) parts.push(`🗣️ ${song.language}`);
                if (song.subtitle) parts.push(`📀 ${song.subtitle}`);
                
                if (parts.length > 0) {
                    metadataHTML = `<div class="song-metadata">${parts.map(p => `<span>${p}</span>`).join('')}</div>`;
                }
            }

            // Better artist display for JioSaavn
            let artistDisplay = song.artist || 'Unknown Artist';
            if (sourceId === 'jiosaavn' && song.subtitle && !song.artist) {
                // Extract artist from subtitle if available
                artistDisplay = song.subtitle.split(' - ')[0] || 'Unknown Artist';
            }

            const buttonId = `download-btn-${sourceId}-${index}`;
            
            card.innerHTML = `
                <img src="${thumbnailUrl}" alt="${song.title}" class="song-thumbnail" onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'100\\' height=\\'100\\'><rect fill=\\'%23333\\'/><text x=\\'50%\\' y=\\'50%\\' text-anchor=\\'middle\\' dy=\\'.3em\\' fill=\\'%23666\\'>No Image</text></svg>'">
                <div class="song-title">${song.title}</div>
                <div class="song-artist">${artistDisplay}</div>
                ${metadataHTML}
                <div class="song-actions">
                    <button id="${buttonId}" class="download-btn" onclick="downloadSong('${song.url}', '${song.title.replace(/'/g, "\\'")}', this)">
                        ⬇ Download
                    </button>
                </div>
            `;

            return card;
        }

        async function downloadSong(url, title, button, useAdvanced = false) {
            console.log(`📥 Download requested: "${title}"`);
            console.log(`   Active downloads: ${activeDownloads}/${MAX_CONCURRENT_DOWNLOADS}`);
            console.log(`   Queue length: ${downloadQueue.length}`);
            
            // Check if download should be queued
            if (activeDownloads >= MAX_CONCURRENT_DOWNLOADS) {
                console.log(`⏸️ Max concurrent downloads reached. Adding to queue...`);
                queueDownload(url, title, button, useAdvanced);
                return;
            }

            // Start download immediately
            console.log(`▶️ Starting download immediately...`);
            activeDownloads++;
            startDownload(url, title, useAdvanced, button);
        }

        async function startDownload(url, title, useAdvanced = false, button = null) {
            // Find button if not provided
            if (!button) {
                // Try to find the button for this song (for resumed downloads)
                const buttons = document.querySelectorAll('.download-btn');
                for (let btn of buttons) {
                    if (btn.onclick && btn.onclick.toString().includes(url)) {
                        button = btn;
                        break;
                    }
                }
            }

            if (button) {
                button.disabled = true;
                button.className = 'download-btn downloading';
                button.innerHTML = '⏳ Starting...';
            }

            try {
                // Prepare request body
                const requestBody = { url, title };
                
                // Add advanced options if they should be used
                if (useAdvanced) {
                    const downloadType = document.getElementById('downloadType')?.value || 'audio';
                    requestBody.advancedOptions = {
                        audioFormat: document.getElementById('audioFormat')?.value || 'mp3',
                        audioQuality: document.getElementById('audioQuality')?.value || '0',
                        embedThumbnail: document.getElementById('embedThumbnail')?.checked !== false,
                        addMetadata: document.getElementById('addMetadata')?.checked !== false,
                        keepVideo: downloadType === 'video',
                        customArgs: document.getElementById('customArgs')?.value || ''
                    };
                }

                const response = await fetch('/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();
                const downloadId = data.download_id;

                // Poll download status
                if (button) {
                    pollDownloadStatus(downloadId, button, title);
                }

            } catch (error) {
                console.error('Download error:', error);
                if (button) {
                    button.className = 'download-btn';
                    button.innerHTML = '❌ Failed';
                    button.disabled = false;
                }
                
                // Download finished (failed), process next in queue
                activeDownloads--;
                processQueue();
            }
        }

        async function pollDownloadStatus(downloadId, button, title) {
            try {
                const response = await fetch(`/download_status/${downloadId}`);
                const data = await response.json();

                // Update local download data
                allDownloads[downloadId] = data;
                updateDownloadManager();
                updateDownloadBadge();

                if (data.status === 'complete') {
                    console.log(`✅ Download complete: "${title}"`);
                    
                    if (button) {
                        button.className = 'download-btn complete';
                        button.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline; margin-right: 5px;"><polyline points="20 6 9 17 4 12"></polyline></svg>Downloaded';
                        
                        // Trigger browser download
                        if (data.download_url) {
                            const link = document.createElement('a');
                            link.href = data.download_url;
                            link.download = data.file;
                            document.body.appendChild(link);
                            link.click();
                            document.body.removeChild(link);
                            
                            // Show notification
                            showNotification(`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline; margin-right: 5px;"><polyline points="20 6 9 17 4 12"></polyline></svg>${data.title} downloaded successfully!`, 'success');
                        }
                    }
                    
                    // Download finished, process next in queue
                    activeDownloads--;
                    console.log(`📉 Download finished. Active: ${activeDownloads}, Queue: ${downloadQueue.length}`);
                    processQueue();
                    
                } else if (data.status === 'error') {
                    console.log(`❌ Download failed: "${title}" - ${data.error}`);
                    
                    if (button) {
                        button.className = 'download-btn';
                        button.innerHTML = '❌ Failed';
                        button.disabled = false;
                    }
                    showNotification(`❌ Download failed: ${data.error || 'Unknown error'}`, 'error');
                    
                    // Download finished (failed), process next in queue
                    activeDownloads--;
                    console.log(`📉 Download failed. Active: ${activeDownloads}, Queue: ${downloadQueue.length}`);
                    processQueue();
                    
                } else if (data.status === 'cancelled') {
                    console.log(`🚫 Download cancelled: "${title}"`);
                    
                    if (button) {
                        button.className = 'download-btn';
                        button.innerHTML = '🚫 Cancelled';
                        button.disabled = false;
                    }
                    
                    // Download cancelled, process next in queue
                    activeDownloads--;
                    console.log(`📉 Download cancelled. Active: ${activeDownloads}, Queue: ${downloadQueue.length}`);
                    processQueue();
                    
                } else if (data.status === 'downloading') {
                    // Show progress
                    const progress = data.progress || 0;
                    const speed = data.speed || 'N/A';
                    const eta = data.eta || 'N/A';
                    
                    if (button) {
                        button.className = 'download-btn downloading';
                        button.innerHTML = `
                            <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
                                <div>⏳ ${Math.round(progress)}%</div>
                                <div style="font-size: 0.75em; opacity: 0.8;">${speed} • ETA ${eta}</div>
                            </div>
                        `;
                    }
                    
                    // Keep polling
                    setTimeout(() => pollDownloadStatus(downloadId, button, title), 500);
                } else {
                    // Keep polling for other statuses
                    setTimeout(() => pollDownloadStatus(downloadId, button, title), 1000);
                }
            } catch (error) {
                console.error('Status check error:', error);
                if (button) {
                    button.className = 'download-btn';
                    button.innerHTML = '⬇ Download';
                    button.disabled = false;
                }
                // Download failed, process next in queue
                activeDownloads--;
                processQueue();
            }
        }


        // Show notification
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            
            // Use semantic colors
            let bgColor, textColor, borderColor;
            
            if (type === 'success') {
                bgColor = 'var(--success-color)';
                textColor = 'white';
                borderColor = 'var(--success-color)';
            } else if (type === 'error') {
                bgColor = 'var(--error-color)';
                textColor = 'white';
                borderColor = 'var(--error-color)';
            } else {
                bgColor = 'var(--accent-color)';
                textColor = 'white';
                borderColor = 'var(--accent-color)';
            }
            
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 20px;
                background: ${bgColor};
                color: ${textColor};
                border: 1px solid ${borderColor};
                border-radius: 10px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
                z-index: 10000;
                animation: slideIn 0.3s ease-out;
                max-width: 400px;
                font-size: 14px;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => notification.remove(), 300);
            }, 5000);
        }
    </script>
